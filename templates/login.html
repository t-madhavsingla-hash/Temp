{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden mt-10">
    <div class="px-8 py-10">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Welcome Back</h2>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-5">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="email">
                    Email Address
                </label>
                <input class="w-full px-4 py-2 border rounded-md text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" 
                       id="email" name="email" type="email" required placeholder="you@example.com">
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">
                    Password
                </label>
                <input class="w-full px-4 py-2 border rounded-md text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" 
                       id="password" name="password" type="password" required placeholder="••••••••">
            </div>
            
            <div>
                <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out" 
                        type="submit">
                    Sign In
                </button>
            </div>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-gray-500 text-sm">
                Don't have an account? 
                <a href="{{ url_for('register') }}" class="text-indigo-600 hover:text-indigo-800 font-semibold transition">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
